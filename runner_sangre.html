    /* velocidad vertical instantánea: dy/dt = amp * 2π * cos(age*2π + initPhase) */
    var vx=-gameSpeed; /* siempre negativo (va a la izquierda) */
    var vy=amp*Math.PI*2*Math.cos(pj.age*Math.PI*2+pj.initPhase);
    var angle=Math.atan2(vy,vx); /* ángulo de la dirección de movimiento */
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(angle);
    /* glow suave permanente */
    ctx.globalAlpha=0.25;
    var gl=ctx.createRadialGradient(0,0,2,0,0,22);
    gl.addColorStop(0,'rgba(255,100,255,0.9)');gl.addColorStop(1,'rgba(180,0,200,0)');
    ctx.fillStyle=gl;ctx.beginPath();ctx.arc(0,0,22,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    /* óvalo magenta */
    ctx.shadowColor='rgba(200,0,220,0.8)';ctx.shadowBlur=10;
    var pg=ctx.createRadialGradient(-2,-2,1,0,0,9);
    pg.addColorStop(0,'#ff99ff');pg.addColorStop(0.5,'#cc00cc');pg.addColorStop(1,'#660044');
    ctx.fillStyle=pg;
    ctx.beginPath();ctx.ellipse(0,0,13,8,0,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    /* destello */
    ctx.fillStyle='rgba(255,220,255,0.65)';
    ctx.beginPath();ctx.arc(-3,-2,3,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
}

/* ── TRATAMIENTOS (pickups boss) ── */
function drawTreatPickups(){
  var now=Date.now();
  /* paleta verde para Parásito, cyan para Tumor, azul/blanca para Virus */
  var isParasite=!!(parasiteBoss&&!parasiteBoss.isDying);
  var isTumor=!!(tumorBoss&&!tumorBoss.isDying);
  treatPickups.forEach(function(tp){
    /* tp.y es la posición real en todos los estados (arc, active, absorbing) */
    var x=tp.x, y=tp.y;
    var sc=(tp.state==='absorbing'&&tp.absorbScale!=null)?tp.absorbScale:1;
    var baseAlpha=(tp.state==='arc')?0.75:sc;
    ctx.save();ctx.translate(x,y);
    if(sc!==1)ctx.scale(sc,sc);
    /* brillo halo */
    ctx.globalAlpha=(0.3+0.15*Math.sin(now*0.006))*baseAlpha;
    var glCol=tp.type==='missile'?'255,120,0':tp.type==='weapon'?'255,200,0':isParasite?'80,255,120':isTumor?'0,220,255':'100,255,200';
    var gl=ctx.createRadialGradient(0,0,3,0,0,31);
    gl.addColorStop(0,'rgba('+glCol+',0.9)');gl.addColorStop(1,'rgba('+glCol+',0)');
    ctx.fillStyle=gl;ctx.beginPath();ctx.arc(0,0,31,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=baseAlpha;
    ctx.scale(1.4,1.4);
    if(tp.type==='missile'){
      /* misil — rojo/naranja con llama, más grande que la jeringa */
      ctx.save();
      var _mpulse=0.92+0.08*Math.sin(now*0.009+tp.arcTimer*3);
      ctx.scale(_mpulse,_mpulse);
      /* llama trasera */
      var _mfg=ctx.createRadialGradient(-16,0,1,-16,0,9);
      _mfg.addColorStop(0,'rgba(255,240,100,0.9)');
      _mfg.addColorStop(0.5,'rgba(255,100,0,0.7)');
      _mfg.addColorStop(1,'rgba(200,30,0,0)');
      ctx.fillStyle=_mfg;
      ctx.shadowColor='rgba(255,100,0,0.8)';ctx.shadowBlur=12;
      ctx.beginPath();ctx.arc(-16,0,9,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
      /* cuerpo */
      var _mbg=ctx.createLinearGradient(0,-7,0,7);
      _mbg.addColorStop(0,'#ffcc44');_mbg.addColorStop(0.5,'#ff6600');_mbg.addColorStop(1,'#cc1100');
      ctx.fillStyle=_mbg;
      ctx.strokeStyle='rgba(255,200,0,0.6)';ctx.lineWidth=1;
      ctx.beginPath();ctx.roundRect(-12,-5,22,10,3);ctx.fill();ctx.stroke();
      /* nariz */
      ctx.fillStyle='#ffee66';
      ctx.beginPath();ctx.moveTo(10,-4);ctx.lineTo(18,0);ctx.lineTo(10,4);ctx.closePath();ctx.fill();
      /* aletas */
      ctx.fillStyle='#cc3300';
      ctx.beginPath();ctx.moveTo(-12,-5);ctx.lineTo(-17,-12);ctx.lineTo(-6,-5);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(-12,5);ctx.lineTo(-17,12);ctx.lineTo(-6,5);ctx.closePath();ctx.fill();
      /* ventanilla */
      ctx.fillStyle='rgba(160,230,255,0.85)';
      ctx.beginPath();ctx.ellipse(4,0,4,3,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.6)';
      ctx.beginPath();ctx.ellipse(3,-0.5,1.5,1,0,0,Math.PI*2);ctx.fill();
      /* etiqueta "x5" */
      ctx.fillStyle='#ffffff';ctx.font='bold 8px Nunito,sans-serif';
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor='#000';ctx.shadowBlur=3;
      ctx.fillText('×5',-1,0);
      ctx.shadowBlur=0;
      ctx.restore();
    }else if(tp.type==='weapon'){
      /* jeringa amarilla/naranja — power-up de arma */
      ctx.save();ctx.rotate(-Math.PI/5);
      /* cuerpo de la jeringa */
      ctx.fillStyle='#ffcc00';ctx.strokeStyle='#ff8800';ctx.lineWidth=1.2;
      ctx.beginPath();ctx.roundRect(-12,-4,20,8,3);ctx.fill();ctx.stroke();
      /* émbolo */
      ctx.fillStyle='#ff8800';
      ctx.beginPath();ctx.roundRect(7,-3,6,6,1);ctx.fill();
      /* aguja */
      ctx.fillStyle='#aaddff';ctx.strokeStyle='#88bbdd';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(-12,-1.5);ctx.lineTo(-20,0);ctx.lineTo(-12,1.5);ctx.closePath();ctx.fill();ctx.stroke();
      /* líquido interior */
      ctx.fillStyle='rgba(100,200,255,0.75)';
      ctx.beginPath();ctx.roundRect(-10,-2.5,14,5,2);ctx.fill();
      /* destello */
      ctx.fillStyle='rgba(255,255,255,0.55)';
      ctx.beginPath();ctx.ellipse(-6,-1.5,3,1,0,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }else if(tp.type==='pill'){
      ctx.save();ctx.rotate(-0.35);
      ctx.fillStyle=isParasite?'#ccff66':isTumor?'#aaffff':'#ddeeff';
      ctx.beginPath();ctx.ellipse(0,0,14,7,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=isParasite?'#448800':isTumor?'#007799':'#2266cc';
      ctx.beginPath();ctx.ellipse(6,0,8,7,0,-Math.PI/2,Math.PI/2);ctx.fill();
      ctx.strokeStyle=isParasite?'#88cc00':isTumor?'#00ddff':'#aaccff';ctx.lineWidth=1.2;
      ctx.beginPath();ctx.ellipse(0,0,14,7,0,0,Math.PI*2);ctx.stroke();
      ctx.restore();
    }else if(tp.type==='flask'){
      ctx.strokeStyle=isParasite?'#55aa33':isTumor?'#00bbcc':'#88aadd';ctx.lineWidth=2;
      ctx.fillStyle=isParasite?'#1a3310':isTumor?'#003344':'#223355';
      ctx.beginPath();ctx.moveTo(-5,-14);ctx.lineTo(-5,-8);ctx.lineTo(-10,6);ctx.lineTo(-10,12);ctx.lineTo(10,12);ctx.lineTo(10,6);ctx.lineTo(5,-8);ctx.lineTo(5,-14);ctx.closePath();ctx.fill();ctx.stroke();
      ctx.fillStyle=isParasite?'#44dd44':isTumor?'#00eeff':'#44aaff';
      ctx.beginPath();ctx.moveTo(-9,4);ctx.lineTo(-9,12);ctx.lineTo(9,12);ctx.lineTo(9,4);ctx.quadraticCurveTo(0,0,-9,4);ctx.closePath();ctx.fill();
      ctx.fillStyle=isParasite?'#226600':isTumor?'#005566':'#1144aa';ctx.fillRect(-6,-16,12,4);
      ctx.strokeStyle=isParasite?'#88ff88':isTumor?'#44eeff':'#99ccff';ctx.beginPath();ctx.ellipse(0,8,6,3,0,0,Math.PI*2);ctx.stroke();
    }else{ /* vaccine */
      ctx.save();ctx.rotate(Math.PI/4);
      ctx.fillStyle=isParasite?'#ddffd0':isTumor?'#d0ffff':'#ddeeff';
      ctx.strokeStyle=isParasite?'#559944':isTumor?'#00aacc':'#8899bb';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.roundRect(-4,-13,8,22,3);ctx.fill();ctx.stroke();
      ctx.fillStyle=isParasite?'#44ff44':isTumor?'#00ffff':'#ffee44';
      ctx.beginPath();ctx.roundRect(-3,-8,6,12,2);ctx.fill();
      ctx.fillStyle=isParasite?'#aaddaa':isTumor?'#aaeeff':'#ccddee';ctx.fillRect(-3,-13,6,4);
      ctx.fillStyle='#888';ctx.fillRect(-1,-16,2,5);
      ctx.strokeStyle=isParasite?'#66cc44':isTumor?'#00ccee':'#99aacc';ctx.lineWidth=2;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(0,9);ctx.lineTo(0,16);ctx.stroke();
      ctx.restore();
    }
    ctx.restore();
  });
}

/* ── TUMOR MALIGNO — constantes de forma ── */
/* Distancias de vértices del blob: array fijo (no cambia entre frames), índice i de 0..14 */
var _TV_SEED=[0.72,0.45,0.88,0.33,0.91,0.56,0.19,0.78,0.42,0.65,0.27,0.83,0.51,0.14,0.69];
/* Manchas de tejido enfermo: coord relativas a (0,0) en espacio normalizado */
var _TV_SPOTS=[
  {nx:-0.28,ny:-0.50,nr:0.16},{nx: 0.14,ny:-0.34,nr:0.11},
  {nx:-0.52,ny: 0.08,nr:0.18},{nx: 0.06,ny: 0.40,nr:0.13},
  {nx:-0.38,ny: 0.52,nr:0.12},{nx: 0.20,ny: 0.22,nr:0.09},
  {nx:-0.10,ny: 0.02,nr:0.19},{nx:-0.44,ny:-0.24,nr:0.11},
  {nx: 0.10,ny:-0.10,nr:0.08},{nx:-0.20,ny: 0.30,nr:0.12},
];
/* Tentáculos: {ty=Y normalizado base, amp, freq, phase, w=ancho base} */
var _TV_TENT=[
  {ty:-0.52, amp:0.14, freq:0.85, ph:0.00, w:11},
  {ty: 0.06, amp:0.18, freq:0.68, ph:1.80, w: 9},
  {ty: 0.55, amp:0.11, freq:1.05, ph:0.95, w: 8},
];
/* Goteo: {ox=X normalizado fuente, oy=Y normalizado fuente, phase offset} */
var _TV_DRIP=[
  {ox:-0.33, oy:0.80, ph:0.00},
  {ox: 0.06, oy:0.88, ph:0.42},
  {ox:-0.16, oy:0.84, ph:0.71},
];

/* ── TUMOR MALIGNO (jefe final) ── */
function drawTumorBoss(){
  var tb=tumorBoss;
  if(!tb)return;

  var midY=(LANE[0]+LANE[1])/2;
  var tbH=tb.bodyH||H*0.46;
  var t=tb.t;

  /* Radio base del blob — aplastado en X para que parte del cuerpo salga por el borde */
  var bRX=tbH*0.27; /* radio horizontal (hacia la izquierda) */
  var bRY=tbH*0.47; /* radio vertical */
  /* Centro del blob: en X está casi en el borde derecho, parte del blob sale de pantalla */
  var anchorX=W-bRX*0.55;

  /* ── SHAKE ── */
  var shakeX=0,shakeY=0;
  if(tb.shakeTimer>0&&tb.shakeTimerMax>0){
    var shFrac=tb.shakeTimer/tb.shakeTimerMax;
    shakeX=Math.sin(tb.shakeTimer*82)*tb.shake*shFrac;
    shakeY=Math.cos(tb.shakeTimer*64)*tb.shake*0.38*shFrac;
  }
  if(tb.isDying&&tb.deathPhase===0){
    var ds=tb.deathTimer/0.5;
    shakeX+=Math.sin(tb.deathTimer*135)*(1-ds)*22;
    shakeY+=Math.cos(tb.deathTimer*92)*(1-ds)*9;
  }

  /* ── MUERTE: fases 1 y 2 ── */
  if(tb.isDying){
    if(tb.deathPhase===1){
      var fp=tb.deathTimer/0.8;
      ctx.save();
      ctx.globalAlpha=Math.max(0,(1-fp)*0.92);
      var tCX=anchorX,tCY=midY;
      var fg=ctx.createRadialGradient(tCX,tCY,12,tCX,tCY,bRY*1.8);
      fg.addColorStop(0,'rgba(255,60,60,0.95)');
      fg.addColorStop(0.35,'rgba(160,10,10,0.75)');
      fg.addColorStop(1,'rgba(60,0,0,0)');
      ctx.fillStyle=fg;ctx.beginPath();ctx.arc(tCX,tCY,bRY*1.8,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }else if(tb.deathPhase===2){
      ctx.save();
      ctx.globalAlpha=Math.min(0.98,tb.deathTimer/1.0*1.05);
      ctx.fillStyle='#000000';ctx.fillRect(0,0,W,H);
      ctx.restore();
      return;
    }
    if(tb.deathPhase!==0)return;
  }

  var cx=anchorX+shakeX, cy=midY+shakeY;

  /* ── RESPIRACIÓN LENTA ── */
  var breathe=0.985+0.015*Math.sin(t*1.05);
  var rX=bRX*breathe, rY=bRY*breathe;

  /* ── CONSTRUIR VÉRTICES DEL BLOB (catmull-rom, seed fijo) ── */
  /* 15 vértices, distancias pseudo-aleatorias consistentes entre frames */
  /* Solo se añade un wobble muy lento (~0.012 amplitud) para sensación viva */
  var nV=15;
  var verts=[];
  for(var i=0;i<nV;i++){
    var ang=i*Math.PI*2/nV - Math.PI/2;
    var sv=_TV_SEED[i];
    /* variación fija: ±28% sobre radio base */
    var rVar=0.72+sv*0.56;
    var wx=rX*rVar*(0.82+sv*0.20);
    var wy=rY*rVar*(0.90+((sv*6.1)%1)*0.18);
    /* wobble vivo muy sutil */
    var wb=1+0.013*Math.sin(t*0.7+i*0.85);
    verts.push({x:Math.cos(ang)*wx*wb, y:Math.sin(ang)*wy*wb});
  }

  /* Helper: dibuja el blob como curva catmull-rom → bezier cúbico */
  function blobPath(){
    var n=verts.length;
    ctx.beginPath();
    for(var bi=0;bi<n;bi++){
      var p0=verts[(bi-1+n)%n],p1=verts[bi],
          p2=verts[(bi+1)%n],p3=verts[(bi+2)%n];
      var c1x=p1.x+(p2.x-p0.x)/6, c1y=p1.y+(p2.y-p0.y)/6;
      var c2x=p2.x-(p3.x-p1.x)/6, c2y=p2.y-(p3.y-p1.y)/6;
      if(bi===0)ctx.moveTo(p1.x,p1.y);
      ctx.bezierCurveTo(c1x,c1y,c2x,c2y,p2.x,p2.y);
    }
    ctx.closePath();
  }

  /* ── HALO AMBIENTE ── */
  ctx.save();
  var haloA=0.12+0.06*Math.sin(t*1.5)+tb.absorbGlow*0.28;
  ctx.globalAlpha=haloA;
  var hg=ctx.createRadialGradient(cx,cy,rY*0.2,cx,cy,rY*1.5);
  hg.addColorStop(0,'rgba(180,20,10,0)');
  hg.addColorStop(0.45,'rgba(140,15,8,0.6)');
  hg.addColorStop(1,'rgba(80,0,0,0)');
  ctx.fillStyle=hg;ctx.beginPath();ctx.arc(cx,cy,rY*1.5,0,Math.PI*2);ctx.fill();
  ctx.restore();

  /* ── TENTÁCULOS (detrás del cuerpo) ── */
  ctx.save();
  _TV_TENT.forEach(function(tn){
    /* base: en el lado izquierdo del blob */
    var bX=cx-rX*0.80;
    var bY=cy+tn.ty*rY;
    /* punta: se extiende hacia la izquierda con ondulación */
    var len=rX*(1.0+0.35*Math.sin(t*tn.freq+tn.ph));
    var tipX=bX-len;
    var tipY=bY+rY*0.30*Math.sin(t*tn.freq*0.75+tn.ph+1.3);
    var cp1x=bX-len*0.32, cp1y=bY+rY*tn.amp*Math.sin(t*tn.freq+tn.ph);
    var cp2x=bX-len*0.68, cp2y=tipY+rY*0.12*Math.cos(t*tn.freq*0.9+tn.ph);
    /* tentáculo: stroke con ancho decreciente simulado con dos pasadas */
    ctx.lineCap='round';ctx.lineJoin='round';
    /* sombra */
    ctx.shadowColor='rgba(50,0,0,0.75)';ctx.shadowBlur=10;
    /* cuerpo del tentáculo */
    var tGrad=ctx.createLinearGradient(bX,bY,tipX,tipY);
    tGrad.addColorStop(0,'#7a2828');
    tGrad.addColorStop(0.5,'#5a1616');
    tGrad.addColorStop(1,'#2e0808');
    ctx.strokeStyle=tGrad;ctx.lineWidth=tn.w;
    ctx.beginPath();ctx.moveTo(bX,bY);
    ctx.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,tipX,tipY);
    ctx.stroke();
    /* vena interior */
    ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(150,20,20,0.45)';ctx.lineWidth=tn.w*0.25;
    ctx.beginPath();ctx.moveTo(bX,bY);
    ctx.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,tipX,tipY);
    ctx.stroke();
  });
  ctx.shadowBlur=0;ctx.restore();

  /* ── CUERPO — CAPA 1: relleno carnoso base ── */
  ctx.save();ctx.translate(cx,cy);
  ctx.shadowColor='rgba(70,0,0,0.95)';ctx.shadowBlur=32;
  var bGrad=ctx.createRadialGradient(-rX*0.18,-rY*0.12,rY*0.06,0,0,rY*1.0);
  bGrad.addColorStop(0,'#8a3232');   /* carne enferma clara */
  bGrad.addColorStop(0.38,'#7a2828');/* base principal */
  bGrad.addColorStop(0.72,'#5c1818');/* oscurece hacia borde */
  bGrad.addColorStop(1,'#3a0a0a');   /* borde muy oscuro */
  ctx.fillStyle=bGrad;
  blobPath();ctx.fill();
  ctx.shadowBlur=0;ctx.restore();

  /* ── CUERPO — CAPA 2: manchas de tejido enfermo (#2a0808 / #3a0a0a) ── */
  ctx.save();ctx.translate(cx,cy);
  blobPath();ctx.clip();
  _TV_SPOTS.forEach(function(sp){
    var sg=ctx.createRadialGradient(sp.nx*rX,sp.ny*rY,0,sp.nx*rX,sp.ny*rY,sp.nr*rY*1.5);
    sg.addColorStop(0,'rgba(30,4,4,0.88)');
    sg.addColorStop(0.45,'rgba(42,8,8,0.58)');
    sg.addColorStop(1,'rgba(58,10,10,0)');
    ctx.fillStyle=sg;
    ctx.beginPath();ctx.arc(sp.nx*rX,sp.ny*rY,sp.nr*rY*1.5,0,Math.PI*2);ctx.fill();
  });
  ctx.restore();

  /* ── CUERPO — CAPA 3: venas #aa1a1a ── */
  ctx.save();ctx.translate(cx,cy);
  blobPath();ctx.clip();
  var veins=[
    {x1:-rX*0.04,y1:-rY*0.72,x2:-rX*0.44,y2:rY*0.38,
     c1x:-rX*0.38,c1y:-rY*0.08,c2x:-rX*0.08,c2y:rY*0.12},
    {x1: rX*0.12,y1:-rY*0.52,x2: rX*0.08,y2: rY*0.62,
     c1x: rX*0.44,c1y:-rY*0.02,c2x: rX*0.28,c2y:rY*0.22},
    {x1:-rX*0.28,y1: rY*0.22,x2: rX*0.12,y2:-rY*0.48,
     c1x: rX*0.06,c1y: rY*0.02,c2x:-rX*0.08,c2y:-rY*0.08},
    {x1:-rX*0.54,y1:-rY*0.14,x2:-rX*0.14,y2: rY*0.66,
     c1x:-rX*0.22,c1y: rY*0.12,c2x:-rX*0.30,c2y:rY*0.42},
  ];
  veins.forEach(function(v,vi){
    var lw=2.4-vi*0.25;
    ctx.strokeStyle='#aa1a1a';ctx.lineWidth=lw;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(v.x1,v.y1);
    ctx.bezierCurveTo(v.c1x,v.c1y,v.c2x,v.c2y,v.x2,v.y2);
    ctx.stroke();
    /* ramita */
    ctx.strokeStyle='rgba(130,12,12,0.55)';ctx.lineWidth=lw*0.45;
    var brX=(v.x1+v.c1x)/2, brY=(v.y1+v.c1y)/2;
    ctx.beginPath();ctx.moveTo(brX,brY);
    ctx.lineTo(brX+rX*0.20,brY-rY*0.24);
    ctx.stroke();
  });
  ctx.restore();

  /* ── CUERPO — CAPA 4: highlight carnoso interno ── */
  ctx.save();ctx.translate(cx,cy);
  blobPath();ctx.clip();
  var hlG=ctx.createRadialGradient(-rX*0.22,-rY*0.28,rY*0.04,-rX*0.06,-rY*0.08,rY*0.48);
  hlG.addColorStop(0,'rgba(170,70,70,0.40)');
  hlG.addColorStop(0.55,'rgba(130,35,35,0.14)');
  hlG.addColorStop(1,'rgba(90,18,18,0)');
  ctx.fillStyle=hlG;
  ctx.beginPath();ctx.arc(-rX*0.06,-rY*0.08,rY*0.48,0,Math.PI*2);ctx.fill();
  ctx.restore();

  /* ── CUERPO — CAPA 5: goteo de sangre desde borde inferior ── */
  ctx.save();ctx.translate(cx,cy);
  _TV_DRIP.forEach(function(dr){
    var dPhase=((t*0.42+dr.ph)%1);
    var maxLen=rY*0.72;
    var srcY=dr.oy*rY;
    var dropY=srcY+dPhase*maxLen;
    var dropR=Math.max(1.8,(1-dPhase*0.62)*5.8);
    var dA=dPhase<0.68?0.90:Math.max(0,(1-dPhase)*3.12);
    ctx.globalAlpha=dA;
    /* cola delgada */
    if(dPhase<0.58){
      var tailH=dPhase*maxLen*0.52;
      var tG=ctx.createLinearGradient(dr.ox*rX,srcY,dr.ox*rX,srcY+tailH);
      tG.addColorStop(0,'rgba(100,8,8,0)');
      tG.addColorStop(0.5,'rgba(80,5,5,0.55)');
      tG.addColorStop(1,'rgba(70,0,0,0.28)');
      ctx.strokeStyle=tG;ctx.lineWidth=dropR*0.85;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(dr.ox*rX,srcY);ctx.lineTo(dr.ox*rX,srcY+tailH);ctx.stroke();
    }
    /* gota */
    ctx.fillStyle='#6a0e0e';
    ctx.shadowColor='rgba(100,0,0,0.65)';ctx.shadowBlur=7;
    ctx.beginPath();ctx.arc(dr.ox*rX,dropY,dropR,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    ctx.globalAlpha=1;
  });
  ctx.restore();

  /* ── CONTORNO ORGÁNICO ── */
  ctx.save();ctx.translate(cx,cy);
  blobPath();
  ctx.strokeStyle='rgba(90,20,20,0.50)';ctx.lineWidth=3;
  ctx.stroke();
  ctx.restore();

  /* ── FLASH DE IMPACTO ── */
  if(tb.hitFlash>0&&tb.hitFlashMax>0){
    var flashA=0.48*(tb.hitFlash/tb.hitFlashMax);
    ctx.save();ctx.translate(cx,cy);ctx.globalAlpha=flashA;
    ctx.fillStyle='#ff5555';
    blobPath();ctx.fill();
    ctx.restore();
  }

  /* ── TELEGRAPH GLOW ── */
  if(tb.nucleusGlow>0){
    ctx.save();
    ctx.globalAlpha=tb.nucleusGlow*0.50;
    var tgG=ctx.createRadialGradient(cx,cy,8,cx,cy,rY*1.1);
    tgG.addColorStop(0,'rgba(255,80,50,0.90)');tgG.addColorStop(1,'rgba(180,0,0,0)');
    ctx.fillStyle=tgG;ctx.beginPath();ctx.arc(cx,cy,rY*1.1,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  /* ── BARRA HP ── */
  var barW=108,barH=12;
  var bx0=W-barW-8,by0=LANE[0]-38;
  ctx.save();
  ctx.fillStyle='#1a0000';ctx.strokeStyle='#882020';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.roundRect(bx0,by0,barW,barH,4);ctx.fill();ctx.stroke();

  var hpBarCol=hpFrac>0.5?'#cc2222':hpFrac>0.25?'#dd4400':'#ff2200';
  ctx.fillStyle=hpBarCol;ctx.shadowColor=hpBarCol;ctx.shadowBlur=5;
  ctx.beginPath();ctx.roundRect(bx0+1,by0+1,Math.max(0,(barW-2)*hpFrac),barH-2,3);ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='#ffbbbb';ctx.font='bold 7px Nunito,sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('TUMOR MALIGNO',bx0+barW/2,by0+barH/2);
  ctx.restore();
}

/* ── CORAZÓN JEFE (vida extra) ── */
function drawBossHeart(){
  var bh=bossHeart;
  if(!bh)return;
  var x=bh.x, y=LANE[bh.lane];
  var t=bh.t||0;

  /* ── pulso lub-dub: dos picos rápidos cada ~0.9 s ── */
  var tp=((t%0.9)/0.9);          /* fase 0-1 dentro del ciclo */
  var lub=Math.max(0,1-Math.abs(tp-0.12)/0.10);   /* primer golpe  */
  var dub=Math.max(0,1-Math.abs(tp-0.28)/0.09);   /* segundo golpe */
  var heartBeat=1+lub*0.28+dub*0.18;              /* escala 1→1.28→1.18 */

  /* ── 1. halo exterior verde pulsante ── */
  ctx.save();ctx.translate(x,y);
  var haloR=52+8*Math.sin(t*3.5);
  var haloAlpha=0.18+0.12*Math.sin(t*3.5);
  var hg=ctx.createRadialGradient(0,0,10,0,0,haloR);
  hg.addColorStop(0,'rgba(60,255,100,'+haloAlpha+')');
  hg.addColorStop(1,'rgba(60,255,100,0)');
  ctx.fillStyle=hg;
  ctx.beginPath();ctx.arc(0,0,haloR,0,Math.PI*2);ctx.fill();

  /* ── 2. anillo giratorio de partículas orbitando ── */
  var nOrb=7;
  for(var oi=0;oi<nOrb;oi++){
    var oAng=((oi/nOrb)*Math.PI*2)+(t*2.2);
    var oR=38+4*Math.sin(t*4+oi*1.1);
    var ox=Math.cos(oAng)*oR, oy=Math.sin(oAng)*oR;
    var oAlpha=0.55+0.35*Math.sin(t*5+oi*0.9);
    var oSize=3.5+1.5*Math.abs(Math.sin(t*3+oi));
    ctx.globalAlpha=oAlpha;
    ctx.shadowColor='#44ff88';ctx.shadowBlur=8;
    ctx.fillStyle='#88ffaa';
    ctx.beginPath();ctx.arc(ox,oy,oSize,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;

  /* ── 3. anillo de destello giratorio ── */
  ctx.save();ctx.rotate(t*1.4);
  ctx.strokeStyle='rgba(100,255,140,0.35)';ctx.lineWidth=2.5;
  ctx.setLineDash([12,8]);
  ctx.beginPath();ctx.arc(0,0,44,0,Math.PI*2);ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  /* ── 4. corazón principal ── */
  ctx.save();ctx.scale(heartBeat,heartBeat);
  ctx.shadowColor='rgba(50,255,100,0.9)';ctx.shadowBlur=22;

  /* relleno verde con gradiente radial */
  var hfg=ctx.createRadialGradient(-4,-12,2,0,-4,28);
  hfg.addColorStop(0,'#aaffbb');
  hfg.addColorStop(0.4,'#22dd66');
  hfg.addColorStop(1,'#0a6630');
  ctx.fillStyle=hfg;
  ctx.beginPath();
  ctx.moveTo(0,10);
  ctx.bezierCurveTo(-26,-10,-32,-34,-12,-34);
  ctx.bezierCurveTo(0,-34,0,-26,0,-26);
  ctx.bezierCurveTo(0,-26,0,-34,12,-34);
  ctx.bezierCurveTo(32,-34,26,-10,0,10);
  ctx.closePath();ctx.fill();

  /* contorno verde claro */
  ctx.strokeStyle='rgba(180,255,200,0.7)';ctx.lineWidth=2;
  ctx.stroke();
  ctx.shadowBlur=0;

  /* brillo interior */
  ctx.fillStyle='rgba(200,255,220,0.5)';
  ctx.beginPath();ctx.ellipse(-7,-22,7,4,Math.PI/5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.beginPath();ctx.ellipse(-4,-20,3,2,Math.PI/5,0,Math.PI*2);ctx.fill();

  /* ── texto +VIDA ── */
  ctx.shadowColor='rgba(0,80,20,0.8)';ctx.shadowBlur=6;
  ctx.fillStyle='#ffffff';
  ctx.font='bold 13px Nunito,sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('+VIDA',0,-11);
  ctx.shadowBlur=0;
  ctx.restore(); /* escala heartBeat */

  /* ── 5. destellos de cruz en los latidos ── */
  if(lub>0.3||dub>0.2){
    var fI=Math.max(lub,dub);
    ctx.globalAlpha=fI*0.7;
    ctx.strokeStyle='#ccffdd';ctx.lineWidth=2;ctx.lineCap='round';
    ctx.shadowColor='#aaffcc';ctx.shadowBlur=10;
    var cs=18*fI;
    ctx.beginPath();ctx.moveTo(0,-cs);ctx.lineTo(0,cs);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-cs,0);ctx.lineTo(cs,0);ctx.stroke();
    ctx.globalAlpha=1;ctx.shadowBlur=0;
  }

  ctx.restore(); /* translate */
}

/* ── LIFE UP FX ── */
function drawLifeUpFX(){
  if(!lifeUpFX||lifeUpFX.timer<=0)return;
  var total=2.2, t=lifeUpFX.timer;
  var prog=1-t/total;
  var fadeIn=Math.min(1,prog/0.07);
  var fadeOut=t<0.55?t/0.55:1;
  var alpha=fadeIn*fadeOut;

  var hx=W-66, hy=20;          /* ancla sobre los corazones del HUD */
  var rise=prog*72;

  /* anillo expansivo */
  var ringR=12+prog*58;
  ctx.save();
  ctx.globalAlpha=alpha*Math.max(0,0.85-prog)*1.1;
  ctx.strokeStyle='rgba(255,80,120,1)';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.arc(hx,hy,ringR,0,Math.PI*2);ctx.stroke();
  ctx.restore();

  /* corazón flotante con rebote inicial */
  var bounce=prog<0.18?(prog/0.18):(1+0.3*Math.exp(-(prog-0.18)*10)*Math.sin((prog-0.18)*28));
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.shadowColor='rgba(255,80,130,0.95)';ctx.shadowBlur=28;
  ctx.fillStyle='#ff4466';
  ctx.save();
  ctx.translate(hx,hy-rise);ctx.scale(bounce,bounce);
  drawHeart(0,0,18);
  ctx.restore();
  ctx.shadowBlur=0;

  /* texto +1 vida */
  ctx.fillStyle='#ffccd8';
  ctx.font='bold 13px Nunito,sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('+1 vida',hx,hy-rise+32);
  ctx.restore();
}

function wrapTextC(text,x,y,maxW,lineH){
  var words=text.split(' '),line='',lines=[];
  for(var i=0;i<words.length;i++){
    var t=line+words[i]+' ';
    if(ctx.measureText(t).width>maxW&&line){lines.push(line.trim());line=words[i]+' ';}
    else line=t;
  }
  lines.push(line.trim());
  var sy=y-(lines.length-1)*lineH/2;
  lines.forEach(function(l,i){ctx.fillText(l,x,sy+i*lineH);});
}

    ctx.fillStyle='rgba(20,80,40,0.55)';
    ctx.strokeStyle='rgba(34,197,94,0.7)';ctx.lineWidth=2;
    rr(bx,by,bw,bh,10);ctx.fill();ctx.stroke();

    ctx.fillStyle='#ffffff';
    ctx.font='bold 16px Nunito,sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    wrapTextC(qCurrent.q,W/2,by+bh/2,bw-24,19);
  }
}

/* ── RESULT ── */
function drawResult(){
  var msg=resultOk?'✓  ¡Correcto!  +100':'✗  Incorrecto';
  var col=resultOk?'#4ade80':'#f87171';
  ctx.save();
  ctx.font='bold 30px Nunito,sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor=col;ctx.shadowBlur=24;
  ctx.fillStyle=col;
  ctx.fillText(msg,W/2,H*0.5);
  if(!resultOk&&qCurrent){
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,0.6)';
    ctx.font='14px Nunito,sans-serif';
    ctx.fillText('Correcto: '+QS[usedQIdx[usedQIdx.length-1]].a,W/2,H*0.5+36);
  }
  ctx.restore();
}

/* ── HUD ── */
function drawHUD(){
  /* score */
  ctx.fillStyle='rgba(6,18,34,0.82)';rr(8,8,160,32,7);ctx.fill();
  ctx.fillStyle='#64b4ff';ctx.font='bold 14px Nunito,sans-serif';
  ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText('⬡  '+Math.floor(score)+' pts',18,24);

  /* correct answers */
  ctx.fillStyle='rgba(6,18,34,0.82)';rr(8,44,160,26,7);ctx.fill();
  ctx.fillStyle='#4ade80';ctx.font='12px Nunito,sans-serif';
  ctx.fillText('Respuestas: '+correctAns+' / '+usedQIdx.length,18,57);

  /* speed */
  ctx.fillStyle='rgba(6,18,34,0.72)';rr(W/2-58,6,116,26,7);ctx.fill();
  ctx.fillStyle='#8899aa';ctx.font='11px Nunito,sans-serif';
  ctx.textAlign='center';
  ctx.fillText('vel.  '+gameSpeed.toFixed(0)+' px/s',W/2,19);

  /* shield indicator */
  if(shield){
    var pulse=0.65+0.35*Math.sin(Date.now()*0.006);
    ctx.fillStyle='rgba(6,18,34,0.85)';
    rr(W-148,44,133,28,7);ctx.fill();
    ctx.fillStyle='rgba(80,230,120,'+pulse+')';
    ctx.font='bold 13px Nunito,sans-serif';
    ctx.textAlign='right';ctx.textBaseline='middle';
    ctx.fillText('🛡 Escudo activo',W-12,58);
  }

  /* lives (hearts) */
  ctx.fillStyle='#ee3344';
  for(var i=0;i<3;i++){
    ctx.globalAlpha=i<lives?1:0.18;
    drawHeart(W-22-i*33,20,11);
  }
  ctx.globalAlpha=1;

  /* pill counter — 3 dots bottom right */
  var pillDotY=H-22,pillDotR=7,pillGap=20,pillStartX=W-18-2*pillGap;
  ctx.fillStyle='rgba(6,18,34,0.8)';
  rr(pillStartX-pillDotR-10,pillDotY-pillDotR-6,2*pillGap+pillDotR*2+20,pillDotR*2+12,8);ctx.fill();
  for(var pi=0;pi<3;pi++){
    var ppx=pillStartX+pi*pillGap;
    ctx.beginPath();ctx.arc(ppx,pillDotY,pillDotR,0,Math.PI*2);
    if(pi<pillCount){
      ctx.fillStyle='#cc1818';ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.55)';
      ctx.beginPath();ctx.arc(ppx+2,pillDotY-2,pillDotR*0.38,0,Math.PI*2);ctx.fill();
    }else{
      ctx.fillStyle='rgba(55,18,18,0.55)';ctx.fill();
      ctx.strokeStyle='rgba(100,40,40,0.45)';ctx.lineWidth=1.2;
      ctx.beginPath();ctx.arc(ppx,pillDotY,pillDotR,0,Math.PI*2);ctx.stroke();
    }
  }
  ctx.fillStyle='rgba(180,100,100,0.6)';ctx.font='9px Nunito,sans-serif';
  ctx.textAlign='center';
  ctx.fillText('píldoras',pillStartX+pillGap,pillDotY+18);

}

function drawHeart(x,y,s){
  ctx.beginPath();
  ctx.moveTo(x,y+s*0.3);
  ctx.bezierCurveTo(x-s*0.8,y-s*0.4,x-s*1.2,y+s*0.5,x,y+s*1.1);
  ctx.bezierCurveTo(x+s*1.2,y+s*0.5,x+s*0.8,y-s*0.4,x,y+s*0.3);
  ctx.fill();
}

/* ── START SCREEN ── */
function drawStart(){
  ctx.fillStyle='#0a1520';ctx.fillRect(0,0,W,H);

  /* subtle grid */
  ctx.strokeStyle='rgba(30,60,100,0.25)';ctx.lineWidth=1;
  for(var x=0;x<W;x+=80){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(var y=0;y<H;y+=80){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  ctx.textAlign='center';ctx.textBaseline='middle';

  ctx.fillStyle='#e8f4f8';
  ctx.font='bold 40px Nunito,sans-serif';
  ctx.fillText('🩸 Corredor Sanguíneo',W/2,H*0.26);

  ctx.fillStyle='#6699aa';ctx.font='15px Nunito,sans-serif';
  ctx.fillText('Esquiva patógenos · Responde preguntas de biología',W/2,H*0.34);

  /* controls box */
  var bw=310,bh=120,bx=W/2-bw/2,by=H*0.42;
  ctx.fillStyle='rgba(10,25,45,0.92)';ctx.strokeStyle='#1e3a5f';ctx.lineWidth=1.5;
  rr(bx,by,bw,bh,12);ctx.fill();ctx.stroke();
  ctx.fillStyle='#64b4ff';ctx.font='bold 12px Nunito,sans-serif';
  ctx.fillText('CONTROLES',W/2,by+22);
  ctx.fillStyle='#c0d8e8';ctx.font='13px Nunito,sans-serif';
  ctx.fillText('↑  /  ↓   →  Cambiar de carril',W/2,by+50);
  ctx.fillText('Toca la pantalla en móvil  ·  ENTER para iniciar',W/2,by+70);
  ctx.fillStyle='#8899aa';ctx.font='11.5px Nunito,sans-serif';
  ctx.fillText('3 vidas  ·  la velocidad aumenta con el tiempo  ·  +100 por respuesta',W/2,by+97);

  /* legend */
  var lx=W/2-280,ly=H*0.67;
  ctx.fillStyle='rgba(10,25,45,0.88)';ctx.strokeStyle='#1e3a5f';ctx.lineWidth=1;
  rr(lx,ly,560,74,10);ctx.fill();ctx.stroke();
  ctx.fillStyle='#64b4ff';ctx.font='bold 11px Nunito,sans-serif';
  ctx.fillText('PATÓGENOS',W/2,ly+16);

  var icons=[
    {fn:function(){dVirus();},label:'Virus',col:'#ee4444'},
    {fn:function(){dBacteria();},label:'Bacteria',col:'#44bb44'},
    {fn:function(){dFungus();},label:'Hongo',col:'#aa55ee'},
    {fn:function(){dParasite(0);},label:'Parásito',col:'#cccc22'},
  ];
  icons.forEach(function(ic,i){
    ctx.save();ctx.translate(lx+70+i*130,ly+42);ctx.scale(0.65,0.65);ic.fn();ctx.restore();
    ctx.fillStyle=ic.col;ctx.font='11px Nunito,sans-serif';ctx.textAlign='center';
    ctx.fillText(ic.label,lx+70+i*130,ly+63);
  });

  var pulse=0.65+0.35*Math.sin(Date.now()*0.003);
  ctx.globalAlpha=pulse;
  ctx.fillStyle='#64b4ff';ctx.font='bold 15px Nunito,sans-serif';ctx.textAlign='center';
  ctx.fillText('Presiona  ENTER  o  toca  para  comenzar',W/2,H*0.87);
  ctx.globalAlpha=1;

  /* botón reiniciar progreso */
  var rbW=180,rbH=26,rbX=W-rbW-14,rbY=H-36;
  ctx.fillStyle='rgba(40,10,10,0.75)';ctx.strokeStyle='rgba(120,40,40,0.6)';ctx.lineWidth=1;
  ctx.beginPath();ctx.roundRect(rbX,rbY,rbW,rbH,6);ctx.fill();ctx.stroke();
  ctx.fillStyle='rgba(180,80,80,0.75)';ctx.font='11px Nunito,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Borrar progreso guardado',rbX+rbW/2,rbY+rbH/2);
  drawStart._resetRect={x:rbX,y:rbY,w:rbW,h:rbH};
}
drawStart._resetRect=null;

/* ── GAME OVER ── */
function drawGameOver(){
  ctx.fillStyle='rgba(6,12,22,0.97)';ctx.fillRect(0,0,W,H);

  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='#f87171';ctx.font='bold 44px Nunito,sans-serif';
  ctx.fillText('FIN DEL JUEGO',W/2,H*0.24);

  var bw=310,bh=178,bx=W/2-bw/2,by=H*0.32;
  ctx.fillStyle='rgba(10,25,45,0.96)';ctx.strokeStyle='#1e3a5f';ctx.lineWidth=1.5;
  rr(bx,by,bw,bh,14);ctx.fill();ctx.stroke();

  ctx.fillStyle='#64b4ff';ctx.font='bold 44px Nunito,sans-serif';
  ctx.fillText(Math.floor(score),W/2,by+55);
  ctx.fillStyle='#8899aa';ctx.font='13px Nunito,sans-serif';
  ctx.fillText('puntos',W/2,by+82);

  ctx.fillStyle='#4ade80';ctx.font='bold 18px Nunito,sans-serif';
  ctx.fillText(correctAns+' respuestas correctas',W/2,by+116);

  ctx.fillStyle='#8899aa';ctx.font='12px Nunito,sans-serif';
  ctx.fillText(Math.floor(elapsed)+' segundos sobrevividos',W/2,by+146);

  var pulse=0.65+0.35*Math.sin(Date.now()*0.003);
  ctx.globalAlpha=pulse;
  ctx.fillStyle='#64b4ff';ctx.font='bold 15px Nunito,sans-serif';
  ctx.fillText('Presiona  ENTER  para  reintentar',W/2,H*0.82);
  ctx.globalAlpha=1;
}

/* ── BOOTSTRAP ── */
player.x=W*0.22;
player.lane=1;
player.y=LANE[1];
player.fromY=LANE[1];
player.toY=LANE[1];
player.transitionTimer=0;
initParticles();
</script>
