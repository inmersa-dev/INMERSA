<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>INMERSA — Bienvenida al Campamento</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0A1628;
      --accent:    #00D4FF;
      --teal:      #00C9A7;
      --c-globo:   #E74C3C;
      --c-sina:    #00A896;
      --c-thomas:  #64748B;
      --c-player:  #2563EB;
      --bubble-bg: #FFFDF4;
      --bubble-bd: #1C1C2E;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width:100%; height:100%; overflow:hidden;
      background:var(--bg);
      font-family:'Nunito',system-ui,sans-serif;
      color:#fff;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
    }

    /* ── Loading ──────────────────────────────────────────────── */
    #loading {
      position:fixed; inset:0; z-index:999;
      background:var(--bg);
      display:flex; align-items:center; justify-content:center;
      flex-direction:column; gap:16px;
    }
    .spin {
      width:36px; height:36px;
      border:3px solid rgba(0,212,255,.15);
      border-top-color:var(--accent);
      border-radius:50%;
      animation:spin .8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    #loading p { color:#8899AA; font-size:14px; }

    /* ── Scene ────────────────────────────────────────────────── */
    #scene { position:fixed; inset:0; overflow:hidden; }

    /* ── Background ───────────────────────────────────────────── */
    #scene-bg {
      position:absolute; inset:0; z-index:0;
      background-size:cover;
      background-position:center top;
      transition:opacity .45s ease;
    }
    /* gradient overlay so bottom chars/bubbles are readable */
    #scene-bg::after {
      content:'';
      position:absolute; inset:0;
      background:linear-gradient(
        to bottom,
        rgba(0,0,0,.08) 0%,
        rgba(0,0,0,.0)  35%,
        rgba(0,0,0,.42) 70%,
        rgba(0,0,0,.72) 100%
      );
    }

    /* ── Progress dots ─────────────────────────────────────────── */
    #progress-dots {
      position:absolute; top:14px; left:50%; transform:translateX(-50%);
      display:flex; gap:6px; z-index:10;
    }
    .pdot {
      width:8px; height:8px; border-radius:50%;
      background:rgba(255,255,255,.28);
      transition:background .3s, transform .3s;
    }
    .pdot.done   { background:var(--teal); }
    .pdot.active { background:var(--accent); transform:scale(1.3); }

    /* ── Narrator caption (top strip) ──────────────────────────── */
    #narrator-caption {
      position:absolute; top:0; left:0; right:0; z-index:8;
      background:rgba(8,16,32,.86);
      border-bottom:2px solid rgba(0,212,255,.22);
      padding:10px 18px 11px 14px;
      display:none; align-items:center; gap:10px;
      backdrop-filter:blur(8px);
    }
    #narrator-caption.show { display:flex; }
    #narrator-caption .nar-icon { font-size:16px; flex-shrink:0; }
    #narrator-caption .nar-text {
      flex:1; color:#F5C518;
      font-size:13.5px; font-weight:700; font-style:italic;
      line-height:1.5;
    }
    #narrator-caption .nar-tap {
      font-size:11px; color:rgba(255,255,255,.4);
      flex-shrink:0;
      animation:blink 1.5s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:.3} 50%{opacity:1} }

    /* ── Characters area ───────────────────────────────────────── */
    #chars-area {
      position:absolute;
      top:44px;      /* below narrator */
      bottom:158px;  /* above bottom panel */
      left:0; right:0;
      z-index:auto;
      display:flex;
      align-items:stretch;
      overflow:visible;
    }

    /* ── Character slot ────────────────────────────────────────── */
    .char-slot {
      flex:1;
      display:flex; flex-direction:column; align-items:center;
      overflow:visible;
      transition:opacity .35s, filter .35s;
    }
    .char-slot.hidden { display:none !important; }
    .char-slot.dimmed { opacity:.35; filter:saturate(.15) brightness(.65); pointer-events:none; }

    /* Bubble container — fills space above sprite */
    .bubble-wrap {
      flex:1;
      display:flex; align-items:flex-end; justify-content:center;
      padding-bottom:10px;
      overflow:visible;
      width:100%;
    }
    #char-globo  .bubble-wrap { justify-content:flex-start; padding-left:6px; }
    #char-thomas .bubble-wrap { justify-content:flex-end;   padding-right:6px; }

    /* ── Speech bubble ─────────────────────────────────────────── */
    .speech-bubble {
      display:none;
      background:var(--bubble-bg);
      border:2.5px solid var(--bubble-bd);
      border-radius:18px;
      padding:13px 18px 11px;
      width:270px;
      max-width:85vw;
      box-shadow:3px 4px 0 rgba(0,0,0,.3);
      position:relative;
    }
    .speech-bubble.show { display:block; }

    .bubble-speaker {
      font-size:12px; font-weight:900;
      letter-spacing:.09em; text-transform:uppercase;
      margin-bottom:5px;
    }
    .globo-bubble  .bubble-speaker { color:var(--c-globo); }
    .sina-bubble   .bubble-speaker { color:var(--c-sina); }
    .thomas-bubble .bubble-speaker { color:var(--c-thomas); }
    .player-bubble .bubble-speaker { color:var(--c-player); }

    .bubble-text {
      font-size:15px; font-weight:700;
      color:#111827; line-height:1.55;
      min-height:36px;
    }
    .bubble-tap {
      display:none;
      text-align:right;
      font-size:11px; color:#6B7280;
      margin-top:4px;
      animation:blink 1.5s ease-in-out infinite;
    }

    /* Tail — points down-center by default */
    .speech-bubble::before,
    .speech-bubble::after {
      content:'';
      position:absolute; bottom:0; left:50%;
      transform:translateX(-50%) translateY(100%);
      width:0; height:0;
    }
    .speech-bubble::before {
      border:10px solid transparent;
      border-top:11px solid var(--bubble-bd);
    }
    .speech-bubble::after {
      border:8px solid transparent;
      border-top:10px solid var(--bubble-bg);
      margin-top:-1px;
    }
    /* GLOBO (left slot) — tail at left of bubble */
    #char-globo .speech-bubble::before,
    #char-globo .speech-bubble::after { left:28%; }
    /* THOMAS (right slot) — tail at right of bubble */
    #char-thomas .speech-bubble::before,
    #char-thomas .speech-bubble::after { left:72%; }

    /* Player bubble — teal tint */
    .player-bubble {
      background:#EFF9FF;
      border-color:#1D6FA4;
    }
    .player-bubble::before { border-top-color:#1D6FA4 !important; }
    .player-bubble::after  { border-top-color:#EFF9FF !important; }

    /* ── Character sprites ─────────────────────────────────────── */
    .sprite-area {
      flex-shrink:0;
      height:158px;
      width:100%;
      display:flex; justify-content:center; align-items:flex-end;
    }

    .char-sprite {
      background-repeat:no-repeat;
      flex-shrink:0;
    }

    /* GLOBO — sprite sheet, 3 poses side by side */
    .globo-sprite {
      width:112px; height:148px;
      background-image:url('../Imagenes/char_globo.webp');
      background-size:300% auto;
      background-position:0% 40%;
      mix-blend-mode:multiply;
      overflow:hidden;
    }
    .globo-sprite[data-pose="happy"]   { background-position:50% 40%; }
    .globo-sprite[data-pose="confused"]{ background-position:100% 40%; }

    /* SINA — sprite sheet, 3 poses */
    .sina-sprite {
      width:130px; height:200px;
      background-image:url('../Imagenes/char_sina.webp');
      background-size:300% auto;
      background-position:0% 50%;
      mix-blend-mode:multiply;
      overflow:hidden;
      clip-path:inset(0 0 6% 0);
    }
    .sina-sprite[data-pose="happy"]     { background-position:50% 50%; }
    .sina-sprite[data-pose="explaining"]{ background-position:100% 50%; }
    #char-sina .sprite-area { height:200px; }

    /* THOMAS — single PNG */
    .thomas-sprite {
      width:110px; height:185px;
      background-image:url('../Imagenes/char_thomas.png');
      background-size:contain;
      background-position:center bottom;
      background-repeat:no-repeat;
    }

    /* ── Player slot (centered, no sprite) ─────────────────────── */
    #char-player {
      position:absolute;
      bottom:0; left:50%;
      transform:translateX(-50%);
      width:75%;
      flex:none;
      display:none;
    }
    #char-player .bubble-wrap {
      justify-content:center;
      padding-bottom:8px;
    }

    /* ── Bottom panel ──────────────────────────────────────────── */
    #bottom-panel {
      position:absolute; bottom:0; left:0; right:0; z-index:6;
      background:rgba(6,14,28,.93);
      border-top:1.5px solid rgba(0,212,255,.18);
      padding:10px 14px 22px;
      backdrop-filter:blur(10px);
      min-height:20px;
    }

    /* ── Input form ─────────────────────────────────────────────── */
    #input-form { display:none; flex-direction:column; gap:9px; }
    #input-form input {
      background:rgba(255,255,255,.07);
      border:2px solid rgba(136,153,170,.32);
      border-radius:10px;
      color:#fff; font-family:'Nunito',sans-serif;
      font-size:16px; font-weight:700;
      padding:11px 14px; outline:none;
      transition:border-color .2s;
    }
    #input-form input:focus { border-color:var(--accent); }
    #input-form input::placeholder { color:#8899AA; font-weight:400; }
    .confirm-btn {
      background:var(--accent); color:#000;
      font-family:'Nunito',sans-serif;
      font-size:15px; font-weight:800;
      padding:11px; border:none; border-radius:10px;
      cursor:pointer; transition:opacity .2s;
    }
    .confirm-btn:disabled { opacity:.38; }

    /* ── Info card ──────────────────────────────────────────────── */
    #info-card {
      display:none;
      background:rgba(0,212,255,.07);
      border:1.5px solid rgba(0,212,255,.28);
      border-radius:12px;
      padding:10px 13px;
      margin-bottom:6px;
    }
    .info-title {
      font-size:10px; font-weight:900;
      letter-spacing:.09em; text-transform:uppercase;
      color:var(--accent); margin-bottom:5px;
    }
    .info-body { font-size:13px; color:#CCE8FF; font-weight:600; line-height:1.55; }

    /* ── Choices ─────────────────────────────────────────────────── */
    #choices { display:none; flex-direction:column; gap:7px; max-height:240px; overflow-y:auto; }
    .choice-btn {
      background:rgba(255,255,255,.06);
      border:1.5px solid rgba(136,153,170,.28);
      border-radius:10px; color:#fff;
      font-family:'Nunito',sans-serif;
      font-size:13px; font-weight:700;
      padding:10px 13px; text-align:left; cursor:pointer;
      display:flex; align-items:center; gap:9px;
      transition:background .15s, border-color .15s;
    }
    .choice-btn:active { background:rgba(0,212,255,.12); border-color:var(--accent); }
    .choice-btn.thomas-yes { border-color:var(--teal); color:var(--teal); }
    .choice-btn.thomas-yes:active { background:rgba(0,201,167,.12); }
    .choice-btn.thomas-no  { border-color:#f87171; color:#f87171; }
    .choice-btn.thomas-no:active  { background:rgba(231,76,60,.12); }

    /* ── Result overlay ─────────────────────────────────────────── */
    #result-overlay {
      position:fixed; inset:0; z-index:50;
      background:rgba(10,22,40,.96);
      display:none; flex-direction:column;
      align-items:center; justify-content:center;
      gap:20px; padding:36px; text-align:center;
    }
    #result-overlay.show { display:flex; }
    #result-overlay .big-icon { font-size:64px; }
    #result-overlay h2 { font-size:24px; font-weight:900; }
    #result-overlay p  { font-size:15px; color:#8899AA; line-height:1.6; }
    .finish-btn {
      margin-top:8px; background:var(--accent); color:#000;
      font-family:'Nunito',sans-serif;
      font-size:16px; font-weight:800;
      padding:14px 36px; border:none; border-radius:12px; cursor:pointer;
    }

    /* ── Toast ──────────────────────────────────────────────────── */
    #toast {
      position:fixed; top:20px; left:50%; transform:translateX(-50%);
      background:#0F2236; border:1px solid var(--accent);
      color:#fff; font-size:14px; font-weight:700;
      padding:10px 20px; border-radius:10px;
      z-index:100; opacity:0; transition:opacity .3s;
      pointer-events:none; white-space:nowrap;
    }
    #toast.show { opacity:1; }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="spin"></div>
  <p>Cargando el campamento…</p>
</div>

<!-- Scene -->
<div id="scene">
  <div id="scene-bg"></div>

  <!-- Progress dots -->
  <div id="progress-dots">
    <div class="pdot" id="pd0"></div>
    <div class="pdot" id="pd1"></div>
    <div class="pdot" id="pd2"></div>
    <div class="pdot" id="pd3"></div>
    <div class="pdot" id="pd4"></div>
    <div class="pdot" id="pd5"></div>
  </div>

  <!-- Narrator caption -->
  <div id="narrator-caption">
    <span class="nar-icon">📖</span>
    <p class="nar-text" id="narrator-text"></p>
    <span class="nar-tap">▶</span>
  </div>

  <!-- Characters -->
  <div id="chars-area">

    <!-- GLOBO -->
    <div class="char-slot" id="char-globo">
      <div class="bubble-wrap">
        <div class="speech-bubble globo-bubble" id="bubble-globo">
          <div class="bubble-speaker">Globo</div>
          <p class="bubble-text"></p>
          <span class="bubble-tap">toca para continuar ▶</span>
        </div>
      </div>
      <div class="sprite-area">
        <div class="char-sprite globo-sprite" id="sprite-globo" data-pose="neutral"></div>
      </div>
    </div>

    <!-- SINA -->
    <div class="char-slot" id="char-sina">
      <div class="bubble-wrap">
        <div class="speech-bubble sina-bubble" id="bubble-sina">
          <div class="bubble-speaker">Sina</div>
          <p class="bubble-text"></p>
          <span class="bubble-tap">toca para continuar ▶</span>
        </div>
      </div>
      <div class="sprite-area">
        <div class="char-sprite sina-sprite" id="sprite-sina" data-pose="neutral"></div>
      </div>
    </div>

    <!-- THOMAS -->
    <div class="char-slot" id="char-thomas">
      <div class="bubble-wrap">
        <div class="speech-bubble thomas-bubble" id="bubble-thomas">
          <div class="bubble-speaker">Thomas</div>
          <p class="bubble-text"></p>
          <span class="bubble-tap">toca para continuar ▶</span>
        </div>
      </div>
      <div class="sprite-area">
        <div class="char-sprite thomas-sprite" id="sprite-thomas"></div>
      </div>
    </div>

    <!-- PLAYER (centered, no sprite) -->
    <div class="char-slot" id="char-player">
      <div class="bubble-wrap">
        <div class="speech-bubble player-bubble" id="bubble-player">
          <div class="bubble-speaker" id="player-name-tag">Tú</div>
          <p class="bubble-text"></p>
          <span class="bubble-tap">toca para continuar ▶</span>
        </div>
      </div>
    </div>

  </div><!-- /chars-area -->

  <!-- Bottom panel -->
  <div id="bottom-panel">
    <div id="info-card">
      <div class="info-title">💡 Dato científico</div>
      <p class="info-body" id="info-body-text"></p>
    </div>
    <div id="input-form">
      <input type="text" id="name-input" placeholder="Escribe tu nombre…" maxlength="20" autocomplete="off" />
      <button class="confirm-btn" id="confirm-name" disabled>Confirmar ✓</button>
    </div>
    <div id="choices"></div>
  </div>

</div><!-- /scene -->

<!-- Result overlay -->
<div id="result-overlay">
  <div class="big-icon">🏕️</div>
  <h2 id="result-title">¡Bienvenido al campamento!</h2>
  <p id="result-desc">Tu aventura en INMERSA ha comenzado.</p>
  <button class="finish-btn" id="finish-btn">Continuar →</button>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp }             from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged }from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, updateDoc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ── Firebase ───────────────────────────────────────────────────
const app  = initializeApp({
  apiKey:            "AIzaSyARclfJXsjDISiT2JRjzwkoUrmPpGqpho4",
  authDomain:        "inmersa-mvp.firebaseapp.com",
  projectId:         "inmersa-mvp",
  storageBucket:     "inmersa-mvp.firebasestorage.app",
  messagingSenderId: "554325663285",
  appId:             "1:554325663285:web:332e863d1e39e49783db7c",
  measurementId:     "G-RQPE6SVTDP"
});
const auth = getAuth(app);
const db   = getFirestore(app);
let uid = null;

// ── State ──────────────────────────────────────────────────────
const S = {
  playerName:'', personalidad:'', greetingThomas:'', decisionThomas:'',
  typing:false, awaitingInput:false, awaitingChoice:false,
  typeTimeout:null, typeEl:null, tapEl:null, typeOnDone:null,
  moment:0,
};
let currentTxt = '';

// ── DOM ────────────────────────────────────────────────────────
const $bg      = document.getElementById('scene-bg');
const $loading = document.getElementById('loading');
const $result  = document.getElementById('result-overlay');
const dots     = [0,1,2,3,4,5].map(i => document.getElementById('pd'+i));

const $narCap  = document.getElementById('narrator-caption');
const $narText = document.getElementById('narrator-text');
const $narTap  = $narCap.querySelector('.nar-tap');

const $slots = {
  globo:  document.getElementById('char-globo'),
  sina:   document.getElementById('char-sina'),
  thomas: document.getElementById('char-thomas'),
  player: document.getElementById('char-player'),
};
const $sprites = {
  globo:  document.getElementById('sprite-globo'),
  sina:   document.getElementById('sprite-sina'),
};
const $bubbles = {
  globo:  document.getElementById('bubble-globo'),
  sina:   document.getElementById('bubble-sina'),
  thomas: document.getElementById('bubble-thomas'),
  player: document.getElementById('bubble-player'),
};

const $inputForm   = document.getElementById('input-form');
const $nameInput   = document.getElementById('name-input');
const $confirmName = document.getElementById('confirm-name');
const $infoCard    = document.getElementById('info-card');
const $infoBody    = document.getElementById('info-body-text');
const $choices     = document.getElementById('choices');
const $toast       = document.getElementById('toast');

// ── Background ─────────────────────────────────────────────────
const BG_MAP = {
  'bg-campamento': "../Imagenes/bg_campamento.png",
  'bg-fila':       "../Imagenes/bg_campamento.png",
  'bg-tienda':     "../Imagenes/bg_carpa.png",
  'bg-resultado':  "../Imagenes/bg_carpa.png",
  'bg-equipo':     "../Imagenes/bg_carpa.png",
  'bg-decision':   "../Imagenes/bg_carpa.png",
};
let currentBg = '';
function setBg(cls) {
  const url = BG_MAP[cls];
  if (!url || url === currentBg) return;
  currentBg = url;
  $bg.style.opacity = '0';
  setTimeout(() => {
    $bg.style.backgroundImage = `url('${url}')`;
    $bg.style.opacity = '1';
  }, 420);
}

// ── Characters ─────────────────────────────────────────────────
const CHAR_KEYS = ['globo','sina','thomas'];
function showChars(visible=[], speaking='', pose='') {
  const vis  = visible.map(v => v.toLowerCase());
  const spk  = speaking.toLowerCase();
  CHAR_KEYS.forEach(k => {
    const slot = $slots[k];
    if (!vis.includes(k)) {
      slot.classList.add('hidden');
      slot.classList.remove('dimmed');
    } else {
      slot.classList.remove('hidden');
      if (spk && spk !== k) slot.classList.add('dimmed');
      else slot.classList.remove('dimmed');
    }
    // set pose
    if (k === spk && $sprites[k] && pose) $sprites[k].dataset.pose = pose;
  });
  $slots.player.style.display = 'none';
}

// ── Bubbles ────────────────────────────────────────────────────
function hideAllBubbles() {
  Object.values($bubbles).forEach(b => b.classList.remove('show'));
  $narCap.classList.remove('show');
  $slots.player.style.display = 'none';
}
const bubbleTxtEl = k => $bubbles[k].querySelector('.bubble-text');
const bubbleTapEl = k => $bubbles[k].querySelector('.bubble-tap');

// ── Typewriter ─────────────────────────────────────────────────
function typeWrite(txt, el, tapEl, onDone) {
  clearTimeout(S.typeTimeout);
  S.typing    = true;
  S.typeEl    = el;
  S.tapEl     = tapEl;
  S.typeOnDone = onDone;
  el.textContent = '';
  if (tapEl) tapEl.style.display = 'none';
  let i = 0;
  function next() {
    if (i < txt.length) {
      el.textContent += txt[i++];
      S.typeTimeout = setTimeout(next, 22);
    } else {
      S.typing = false;
      if (tapEl) tapEl.style.display = 'block';
      if (onDone) { S.typeOnDone = null; onDone(); }
    }
  }
  next();
}
function skipTypewrite() {
  if (!S.typing) return;
  clearTimeout(S.typeTimeout);
  S.typing = false;
  if (S.typeEl)  S.typeEl.textContent = currentTxt;
  if (S.tapEl)   S.tapEl.style.display = 'block';
  const cb = S.typeOnDone; S.typeOnDone = null;
  if (cb) cb();
}

// ── Progress dots ──────────────────────────────────────────────
function updateDots(idx) {
  dots.forEach((d,i) => {
    d.className = 'pdot' + (i<idx?' done':i===idx?' active':'');
  });
}

// ── Toast ──────────────────────────────────────────────────────
function toast(msg) {
  $toast.textContent = msg; $toast.classList.add('show');
  setTimeout(() => $toast.classList.remove('show'), 2500);
}

// ── Input form ─────────────────────────────────────────────────
$nameInput.addEventListener('input', () => {
  $confirmName.disabled = $nameInput.value.trim().length < 2;
});
$confirmName.addEventListener('click', () => {
  const n = $nameInput.value.trim();
  if (n.length < 2) return;
  S.playerName = n;
  hideInputForm();
  advanceLine();
});
$nameInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !$confirmName.disabled) $confirmName.click();
});
function showInputForm() {
  S.awaitingInput = true;
  $inputForm.style.display = 'flex';
  setTimeout(() => $nameInput.focus(), 80);
}
function hideInputForm() {
  S.awaitingInput = false;
  $inputForm.style.display = 'none';
}

// ── Choices ────────────────────────────────────────────────────
function showChoices(opts) {
  S.awaitingChoice = true;
  $choices.style.display = 'flex';
  $choices.innerHTML = '';
  opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn' + (o.cls ? ' '+o.cls : '');
    btn.innerHTML = (o.icon ? `<span>${o.icon}</span>` : '') + o.label;
    btn.addEventListener('click', () => { hideChoices(); o.onSelect(); });
    $choices.appendChild(btn);
  });
}
function hideChoices() {
  S.awaitingChoice = false;
  $choices.style.display = 'none';
  $choices.innerHTML = '';
}

// ── Info card ──────────────────────────────────────────────────
function showInfo(t) { $infoBody.textContent = t; $infoCard.style.display = 'block'; }
function hideInfo()  { $infoCard.style.display = 'none'; }

// ── Script engine ───────────────────────────────────────────────
let flatLines  = [];
let flatIdx    = -1;
let branchLines= null;
let branchIdx  = 0;

function getCurrentLine() {
  return branchLines ? branchLines[branchIdx] : flatLines[flatIdx];
}
function advanceFlatIdx() {
  if (branchLines) {
    branchIdx++;
    if (branchIdx >= branchLines.length) branchLines = null;
  } else { flatIdx++; }
}
function advanceLine() {
  advanceFlatIdx();
  const line = getCurrentLine();
  if (!line) { finishGame(); return; }
  displayLine(line);
}
function playBranch(lines) {
  branchLines = lines; branchIdx = 0;
  displayLine(lines[0]);
}

// ── Display ─────────────────────────────────────────────────────
function displayLine(line) {
  if (!line) return;
  const mi = typeof line.moment==='number' ? line.moment : S.moment;
  updateDots(mi); S.moment = mi;
  if (line.bg) setBg(line.bg);
  showChars(line.chars||[], line.speaking||'', line.pose||'neutral');
  hideAllBubbles(); hideInputForm(); hideChoices(); hideInfo();

  const txt = typeof line.text==='function' ? line.text() : (line.text||'');
  currentTxt = txt;
  const spk = (typeof line.speaker==='function' ? line.speaker() : (line.speaker||'')).toUpperCase();

  if      (line.action==='input_name')        { showLine(spk,txt,()=>showInputForm()); }
  else if (line.action==='choice_personalidad'){ showLine(spk,txt,()=>showChoices(PERS_OPTS)); }
  else if (line.action==='choice_saludo')      { showLine(spk,txt,()=>showChoices(SALUDO_OPTS)); }
  else if (line.action==='choice_thomas')      { showLine(spk,txt,()=>showChoices(THOMAS_OPTS)); }
  else if (line.action==='info')               { showLine(spk,txt,()=>showInfo(line.infoText||'')); }
  else if (line.action==='branch_thomas')      { runBranch(); }
  else if (line.action==='end')                { showLine(spk,txt,()=>setTimeout(finishGame,1200)); }
  else                                         { showLine(spk,txt,null); }
}

function showLine(speaker, txt, onDone) {
  if (speaker === 'NARRADOR' || !speaker) {
    $narCap.classList.add('show');
    typeWrite(txt, $narText, $narTap, onDone);
    return;
  }
  const key = speaker.toLowerCase();
  if (!CHAR_KEYS.includes(key)) {
    // player
    document.getElementById('player-name-tag').textContent = S.playerName || 'Tú';
    $slots.player.style.display = 'flex';
    $bubbles.player.classList.add('show');
    typeWrite(txt, bubbleTxtEl('player'), bubbleTapEl('player'), onDone);
    return;
  }
  $bubbles[key].classList.add('show');
  typeWrite(txt, bubbleTxtEl(key), bubbleTapEl(key), onDone);
}

// ── Branch ─────────────────────────────────────────────────────
function runBranch() {
  if (S.decisionThomas === 'aceptar') {
    playBranch([
      {moment:5,speaker:'NARRADOR',chars:['thomas'],speaking:'',bg:'bg-equipo',
        text:'*Caminas hacia Thomas y extiendes la mano.*'},
      {moment:5,speaker:'PLAYER',chars:['thomas'],speaking:'PLAYER',bg:'bg-equipo',
        text:'Ey, Thomas. Somos compañeros de equipo. Vamos juntos.'},
      {moment:5,speaker:'THOMAS',chars:['thomas'],speaking:'THOMAS',bg:'bg-equipo',
        text:'Yo…'},
      {moment:5,speaker:'THOMAS',chars:['thomas'],speaking:'THOMAS',bg:'bg-equipo',
        text:'Gracias. De verdad.'},
      {moment:5,speaker:'GLOBO',chars:['globo','thomas'],speaking:'GLOBO',bg:'bg-equipo',pose:'happy',
        text:`Eso es trabajo en equipo, ${S.playerName}. En este campamento ganamos juntos — o perdemos juntos.`},
      {moment:5,speaker:'SINA',chars:['sina'],speaking:'SINA',bg:'bg-equipo',pose:'explaining',
        text:'El caso de Thomas nos va a enseñar más de lo que imaginan. Empecemos.',action:'end'},
    ]);
  } else {
    playBranch([
      {moment:5,speaker:'NARRADOR',chars:['thomas'],speaking:'',bg:'bg-equipo',
        text:'*No dices nada. Thomas lo nota.*'},
      {moment:5,speaker:'THOMAS',chars:['thomas'],speaking:'THOMAS',bg:'bg-equipo',
        text:'Entiendo… ya estoy acostumbrado.'},
      {moment:5,speaker:'GLOBO',chars:['globo','thomas'],speaking:'GLOBO',bg:'bg-equipo',pose:'confused',
        text:`${S.playerName}. La medicina trata a todos los pacientes por igual. Eso incluye a Thomas.`},
      {moment:5,speaker:'GLOBO',chars:['globo'],speaking:'GLOBO',bg:'bg-equipo',pose:'neutral',
        text:'Trabaja con él. Es una orden del campamento.',action:'end'},
    ]);
  }
}

// ── Tap to advance ──────────────────────────────────────────────
document.getElementById('scene').addEventListener('click', () => {
  if (S.awaitingInput || S.awaitingChoice) return;
  if (S.typing) { skipTypewrite(); return; }
  if ($infoCard.style.display !== 'none') { hideInfo(); advanceLine(); return; }
  advanceLine();
});

// ── Finish ──────────────────────────────────────────────────────
async function finishGame() {
  if (uid) {
    try {
      await updateDoc(doc(db,'estudiantes',uid), {
        nombre:S.playerName, personalidad:S.personalidad,
        decision_thomas:S.decisionThomas,
        paso1_completado:true, paso1_ts:serverTimestamp(),
      });
    } catch(e){ console.warn('Firebase save error:',e); }
  }
  window.parent.postMessage({tipo:'resultado_juego',paso:1,puntos:0,completado:true,tiempo_segundos:0},'*');
  document.getElementById('result-title').textContent =
    S.decisionThomas==='aceptar' ? `¡Bienvenido, ${S.playerName}!` : 'El campamento ha comenzado.';
  document.getElementById('result-desc').textContent =
    S.decisionThomas==='aceptar'
      ? 'Tomaste la decisión correcta. Thomas es ahora parte de tu equipo.'
      : 'A veces las segundas oportunidades cambian todo. El campamento recién empieza.';
  $result.classList.add('show');
}

document.getElementById('finish-btn').addEventListener('click', () => {
  if (window.parent!==window) window.parent.postMessage({tipo:'cerrar_juego'},'*');
  else window.history.back();
});

// ── Init ────────────────────────────────────────────────────────
onAuthStateChanged(auth, user => {
  uid = user ? user.uid : null;
  $loading.style.display = 'none';
  $bg.style.backgroundImage = "url('../Imagenes/bg_campamento.png')";
  $bg.style.opacity = '1';
  buildScript();
  flatLines = SCRIPT;
  flatIdx   = -1;
  advanceLine();
});
