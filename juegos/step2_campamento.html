<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>INMERSA — El Guía Presenta la Competencia</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0A1628;
      --accent:    #00D4FF;
      --teal:      #00C9A7;
      --c-max:     #E67E22;
      --c-globo:   #E74C3C;
      --c-sina:    #00A896;
      --c-thomas:  #64748B;
      --c-girl:    #9B59B6;
      --c-player:  #2563EB;
      --bubble-bg: #FFFDF4;
      --bubble-bd: #1C1C2E;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width:100%; height:100%; overflow:hidden;
      background:var(--bg);
      font-family:'Nunito',system-ui,sans-serif;
      color:#fff;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
    }

    /* ── Loading ──────────────────────────────────────────────── */
    #loading {
      position:fixed; inset:0; z-index:999;
      background:var(--bg);
      display:flex; align-items:center; justify-content:center;
      flex-direction:column; gap:16px;
    }
    .spin {
      width:36px; height:36px;
      border:3px solid rgba(0,212,255,.15);
      border-top-color:var(--accent);
      border-radius:50%;
      animation:spin .8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    #loading p { color:#8899AA; font-size:14px; }

    /* ── Scene ────────────────────────────────────────────────── */
    #scene { position:fixed; inset:0; overflow:hidden; }

    /* ── Background video ─────────────────────────────────────── */
    #scene-video {
      position:absolute; inset:0; z-index:0;
      width:100%; height:100%;
      object-fit:cover; object-position:center center;
      transition:opacity .35s ease;
    }
    #scene-grad {
      position:absolute; inset:0; z-index:1;
      pointer-events:none;
      background:linear-gradient(
        to bottom,
        rgba(0,0,0,.08) 0%,
        rgba(0,0,0,.0)  35%,
        rgba(0,0,0,.42) 70%,
        rgba(0,0,0,.72) 100%
      );
    }

    /* ── Progress dots ─────────────────────────────────────────── */
    #progress-dots {
      position:absolute; top:14px; left:50%; transform:translateX(-50%);
      display:flex; gap:6px; z-index:10;
    }
    .pdot {
      width:8px; height:8px; border-radius:50%;
      background:rgba(255,255,255,.28);
      transition:background .3s, transform .3s;
    }
    .pdot.done   { background:var(--teal); }
    .pdot.active { background:var(--accent); transform:scale(1.3); }

    /* ── Narrator caption ──────────────────────────────────────── */
    #narrator-caption {
      position:absolute; top:0; left:0; right:0; z-index:8;
      background:rgba(8,16,32,.86);
      border-bottom:2px solid rgba(0,212,255,.22);
      padding:10px 18px 11px 14px;
      display:none; align-items:center; gap:10px;
      backdrop-filter:blur(8px);
    }
    #narrator-caption.show { display:flex; }
    #narrator-caption .nar-icon { font-size:16px; flex-shrink:0; }
    #narrator-caption .nar-text {
      flex:1; color:#F5C518;
      font-size:13.5px; font-weight:700; font-style:italic; line-height:1.5;
    }
    #narrator-caption .nar-tap {
      font-size:11px; color:rgba(255,255,255,.4); flex-shrink:0;
      animation:blink 1.5s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:.3} 50%{opacity:1} }

    /* ── Characters area ───────────────────────────────────────── */
    #chars-area {
      position:absolute; top:44px; bottom:0;
      left:0; right:0; z-index:auto;
      display:flex; align-items:stretch; overflow:visible;
    }

    .char-slot {
      flex:1; display:flex; flex-direction:column; align-items:center;
      overflow:visible;
    }

    /* Bubble container */
    .bubble-wrap {
      flex:1; display:flex; align-items:center; justify-content:center;
      overflow:visible; width:100%;
    }
    #char-left   .bubble-wrap { justify-content:flex-start; padding-left:6px; }
    #char-right  .bubble-wrap { justify-content:flex-end;   padding-right:6px; }

    /* ── Speech bubble ─────────────────────────────────────────── */
    .speech-bubble {
      display:none;
      background:var(--bubble-bg);
      border:2.5px solid var(--bubble-bd);
      border-radius:18px;
      padding:13px 18px 11px;
      width:270px; max-width:85vw;
      box-shadow:3px 4px 0 rgba(0,0,0,.3);
      position:relative;
    }
    .speech-bubble.show { display:block; }

    .bubble-speaker {
      font-size:12px; font-weight:900;
      letter-spacing:.09em; text-transform:uppercase; margin-bottom:5px;
    }
    .max-bubble    .bubble-speaker { color:var(--c-max); }
    .globo-bubble  .bubble-speaker { color:var(--c-globo); }
    .sina-bubble   .bubble-speaker { color:var(--c-sina); }
    .girl-bubble   .bubble-speaker { color:var(--c-girl); }
    .thomas-bubble .bubble-speaker { color:var(--c-thomas); }
    .player-bubble .bubble-speaker { color:var(--c-player); }

    .bubble-text {
      font-size:15px; font-weight:700;
      color:#111827; line-height:1.55; min-height:36px;
    }
    .bubble-tap {
      display:none; text-align:right;
      font-size:11px; color:#6B7280; margin-top:4px;
      animation:blink 1.5s ease-in-out infinite;
    }

    /* Bubble tails — center by default */
    .speech-bubble::before, .speech-bubble::after {
      content:''; position:absolute; bottom:0; left:50%;
      transform:translateX(-50%) translateY(100%);
      width:0; height:0;
    }
    .speech-bubble::before {
      border:10px solid transparent;
      border-top:11px solid var(--bubble-bd);
    }
    .speech-bubble::after {
      border:8px solid transparent;
      border-top:10px solid var(--bubble-bg);
      margin-top:-1px;
    }
    #char-left  .speech-bubble::before,
    #char-left  .speech-bubble::after { left:28%; }
    #char-right .speech-bubble::before,
    #char-right .speech-bubble::after { left:72%; }

    /* Player bubble */
    .player-bubble { background:#EFF9FF; border-color:#1D6FA4; }
    .player-bubble::before { border-top-color:#1D6FA4 !important; }
    .player-bubble::after  { border-top-color:#EFF9FF !important; }

    /* ── Player slot ───────────────────────────────────────────── */
    #char-player {
      position:absolute; bottom:0; left:50%;
      transform:translateX(-50%);
      width:75%; flex:none; display:none;
    }
    #char-player .bubble-wrap { justify-content:center; padding-bottom:8px; }

    /* ── Bottom panel ──────────────────────────────────────────── */
    #bottom-panel {
      position:absolute; bottom:0; left:0; right:0; z-index:6;
      background:rgba(6,14,28,.93);
      border-top:1.5px solid rgba(0,212,255,.18);
      padding:10px 14px 22px;
      backdrop-filter:blur(10px);
      min-height:20px;
    }

    /* ── Choices ─────────────────────────────────────────────────── */
    #choices { display:none; flex-direction:column; gap:7px; max-height:240px; overflow-y:auto; }
    .choice-btn {
      background:rgba(255,255,255,.06);
      border:1.5px solid rgba(136,153,170,.28);
      border-radius:10px; color:#fff;
      font-family:'Nunito',sans-serif;
      font-size:13px; font-weight:700;
      padding:10px 13px; text-align:left; cursor:pointer;
      display:flex; align-items:center; gap:9px;
      transition:background .15s, border-color .15s;
    }
    .choice-btn:active { background:rgba(0,212,255,.12); border-color:var(--accent); }
    .choice-btn.exact  { border-color:var(--teal); color:var(--teal); }

    /* ── Result overlay ─────────────────────────────────────────── */
    #result-overlay {
      position:fixed; inset:0; z-index:50;
      background:rgba(10,22,40,.97);
      display:none; flex-direction:column;
      align-items:center; justify-content:center;
      gap:16px; padding:36px; text-align:center;
    }
    #result-overlay.show { display:flex; }
    .hito-badge { font-size:64px; animation:pulse-badge 2s ease-in-out infinite; }
    @keyframes pulse-badge {
      0%,100% { transform:scale(1);    filter:drop-shadow(0 0 8px rgba(0,212,255,.4)); }
      50%      { transform:scale(1.08); filter:drop-shadow(0 0 20px rgba(0,212,255,.8)); }
    }
    .hito-label {
      font-size:11px; font-weight:900; letter-spacing:.2em; text-transform:uppercase;
      color:var(--accent);
    }
    #result-overlay h2 { font-size:22px; font-weight:900; color:#fff; margin:0; }
    #result-overlay p  { font-size:14px; color:#8899AA; line-height:1.6; max-width:320px; margin:0; }
    .finish-btn {
      margin-top:8px; background:var(--accent); color:#000;
      font-family:'Nunito',sans-serif;
      font-size:16px; font-weight:800;
      padding:14px 36px; border:none; border-radius:12px; cursor:pointer;
    }

    /* ── Toast ──────────────────────────────────────────────────── */
    #toast {
      position:fixed; top:20px; left:50%; transform:translateX(-50%);
      background:#0F2236; border:1px solid var(--accent);
      color:#fff; font-size:14px; font-weight:700;
      padding:10px 20px; border-radius:10px;
      z-index:100; opacity:0; transition:opacity .3s;
      pointer-events:none; white-space:nowrap;
    }
    #toast.show { opacity:1; }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="spin"></div>
  <p>Cargando…</p>
</div>

<!-- Scene -->
<div id="scene">
  <video id="scene-video" loop muted autoplay playsinline></video>
  <div id="scene-grad"></div>

  <!-- Progress dots -->
  <div id="progress-dots">
    <div class="pdot" id="pd0"></div>
    <div class="pdot" id="pd1"></div>
    <div class="pdot" id="pd2"></div>
    <div class="pdot" id="pd3"></div>
    <div class="pdot" id="pd4"></div>
  </div>

  <!-- Narrator caption -->
  <div id="narrator-caption">
    <span class="nar-icon">📖</span>
    <p class="nar-text" id="narrator-text"></p>

  </div>

  <!-- Characters -->
  <div id="chars-area">

    <!-- LEFT: MAX + GLOBO -->

      <div class="bubble-wrap">
        <div class="speech-bubble max-bubble" id="bubble-max">

          <p class="bubble-text"></p>
          <span class="bubble-tap">toca para continuar ▶</span>
        </div>
        <div class="speech-bubble globo-bubble" id="bubble-globo">
          <div class="bubble-speaker">Globo</div>
          <p class="bubble-text"></p>
          <span class="bubble-tap">toca para continuar ▶</span>
        </div>
      </div>
    </div>

    <!-- CENTER: SINA + GIRL -->
    <div class="char-slot" id="char-center">
      <div class="bubble-wrap">
        <div class="speech-bubble sina-bubble" id="bubble-sina">
          <div class="bubble-speaker">Sina</div>
          <p class="bubble-text"></p>
          <span class="bubble-tap">toca para continuar ▶</span>
        </div>
        <div class="speech-bubble girl-bubble" id="bubble-girl">
          <div class="bubble-speaker">Estudiante</div>
          <p class="bubble-text"></p>
          <span class="bubble-tap">toca para continuar ▶</span>
        </div>
      </div>
    </div>

    <!-- RIGHT: THOMAS -->
    <div class="char-slot" id="char-right">
      <div class="bubble-wrap">
        <div class="speech-bubble thomas-bubble" id="bubble-thomas">
          <div class="bubble-speaker">Thomas</div>
          <p class="bubble-text"></p>
          <span class="bubble-tap">toca para continuar ▶</span>
        </div>
      </div>
    </div>

    <!-- PLAYER (centered, bottom) -->
    <div class="char-slot" id="char-player">
      <div class="bubble-wrap">
        <div class="speech-bubble player-bubble" id="bubble-player">
          <div class="bubble-speaker">Tú</div>
          <p class="bubble-text"></p>
          <span class="bubble-tap">toca para continuar ▶</span>

  </div><!-- /chars-area -->

  <!-- Bottom panel -->
  <div id="bottom-panel">
    <div id="choices"></div>
  </div>

</div><!-- /scene -->

<!-- Result overlay -->
<div id="result-overlay">
  <div class="hito-badge">🏆</div>
  <div class="hito-label">✦ Hito Completado ✦</div>
  <h2>El Guía Presenta la Competencia</h2>
  <p>Ya conoces las reglas. ¡Que empiece la competencia!</p>
  <button class="finish-btn" id="finish-btn">Continuar →</button>
</div>

<div id="toast"></div>
<audio id="bg-music" loop src="../Audio/musica_paso1.mp3"></audio>

<script type="module">
import { initializeApp }              from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, updateDoc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ── Firebase ───────────────────────────────────────────────────
const app = initializeApp({
  apiKey:            "AIzaSyARclfJXsjDISiT2JRjzwkoUrmPpGqpho4",
  authDomain:        "inmersa-mvp.firebaseapp.com",
  projectId:         "inmersa-mvp",
  storageBucket:     "inmersa-mvp.firebasestorage.app",
  messagingSenderId: "554325663285",
  appId:             "1:554325663285:web:332e863d1e39e49783db7c",
  measurementId:     "G-RQPE6SVTDP"
});
const auth = getAuth(app);
const db   = getFirestore(app);
let uid = null;

// ── State ──────────────────────────────────────────────────────
const S = {
  exactAnswer:false,
  typing:false, awaitingChoice:false,
  typeTimeout:null, typeEl:null, tapEl:null, typeOnDone:null,
  moment:0,
};
let currentTxt = '';

// ── DOM ────────────────────────────────────────────────────────
const $video   = document.getElementById('scene-video');
const $loading = document.getElementById('loading');
const $result  = document.getElementById('result-overlay');
const dots     = [0,1,2,3,4].map(i => document.getElementById('pd'+i));

const $narCap  = document.getElementById('narrator-caption');
const $narText = document.getElementById('narrator-text');
const $narTap  = $narCap.querySelector('.nar-tap');

const $slots = { player: document.getElementById('char-player') };
const $bubbles = {
  max:    document.getElementById('bubble-max'),
  globo:  document.getElementById('bubble-globo'),
  sina:   document.getElementById('bubble-sina'),
  girl:   document.getElementById('bubble-girl'),
  thomas: document.getElementById('bubble-thomas'),
  player: document.getElementById('bubble-player'),
};

const $choices = document.getElementById('choices');
const $toast   = document.getElementById('toast');

// ── Video ──────────────────────────────────────────────────────
const VIDEO_MAP = {
  step2_opening:       '../Videos/step2_opening.mp4',
  step2_learn_per_win: '../Videos/step2_learn_per_win.mp4',
  step2_girl_sina:     '../Videos/step2_girl_sina.mp4',
  step2_leaderboards:  '../Videos/step2_leaderboards.mp4',
  step2_thomas_happy:  '../Videos/step2_thomas_happy.mp4',
};
let currentVideo = '';
function setVideo(key) {
  if (!key || key === currentVideo) return;
  currentVideo = key;
  $video.style.opacity = '0';
  setTimeout(() => {
    $video.src = VIDEO_MAP[key] || '';
    $video.load();
    $video.play().catch(()=>{});
    $video.style.opacity = '1';
  }, 350);
}

// ── Characters ─────────────────────────────────────────────────
const CHAR_KEYS = ['max','globo','sina','girl','thomas'];

// ── Bubbles ────────────────────────────────────────────────────
function hideAllBubbles() {
  Object.values($bubbles).forEach(b => b.classList.remove('show'));
  $narCap.classList.remove('show');
  $slots.player.style.display = 'none';
}
const bubbleTxtEl = k => $bubbles[k].querySelector('.bubble-text');
const bubbleTapEl = k => $bubbles[k].querySelector('.bubble-tap');

// ── Typewriter ─────────────────────────────────────────────────
function typeWrite(txt, el, tapEl, onDone) {
  clearTimeout(S.typeTimeout);
  S.typing = true; S.typeEl = el; S.tapEl = tapEl; S.typeOnDone = onDone;
  el.textContent = '';
  if (tapEl) tapEl.style.display = 'none';
  let i = 0;
  function next() {
    if (i < txt.length) {
      el.textContent += txt[i++];
      S.typeTimeout = setTimeout(next, 22);
    } else {
      S.typing = false;
      if (tapEl) tapEl.style.display = 'block';
      if (onDone) { S.typeOnDone = null; onDone(); }
    }
  }
  next();
}
function skipTypewrite() {
  if (!S.typing) return;
  clearTimeout(S.typeTimeout);
  S.typing = false;
  if (S.typeEl) S.typeEl.textContent = currentTxt;
  if (S.tapEl)  S.tapEl.style.display = 'block';
  const cb = S.typeOnDone; S.typeOnDone = null;
  if (cb) cb();
}

// ── Progress dots ──────────────────────────────────────────────
function updateDots(idx) {
  dots.forEach((d,i) => {
    d.className = 'pdot' + (i<idx?' done':i===idx?' active':'');
  });
}

// ── Toast ──────────────────────────────────────────────────────
function toast(msg) {
  $toast.textContent = msg; $toast.classList.add('show');
  setTimeout(() => $toast.classList.remove('show'), 2500);
}

// ── Choices ────────────────────────────────────────────────────
function showChoices(opts) {
  S.awaitingChoice = true;
  $choices.style.display = 'flex';
  $choices.innerHTML = '';
  opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn' + (o.cls ? ' '+o.cls : '');
    btn.textContent = o.label;
    btn.addEventListener('click', () => { hideChoices(); o.onSelect(); });
    $choices.appendChild(btn);
  });
}
function hideChoices() {
  S.awaitingChoice = false;
  $choices.style.display = 'none';
  $choices.innerHTML = '';
}

// ── Script ─────────────────────────────────────────────────────
const LEARN_OPTS = [
  { label:'Que hay que aprender para poder ganar.', cls:'exact',
    onSelect:()=>{ S.exactAnswer=true;  advanceLine(); } },
  { label:'Que hay que practicar mucho.',
    onSelect:()=>{ S.exactAnswer=false; advanceLine(); } },
  { label:'Que es muy difícil.',
    onSelect:()=>{ S.exactAnswer=false; advanceLine(); } },
];

const SCRIPT = [
  { moment:0, video:'step2_opening',       speaker:'MAX',
    text:'En este campamento todo funciona con puntos. Cada reto que completes suma — para ti y para tu equipo.' },
  { moment:1, video:'step2_learn_per_win', speaker:'SINA',
    text:'Hay una frase que define cómo funciona todo aquí: learn per win. ¿Qué les viene a la mente cuando la escuchan?', action:'choice_learn' },
  { moment:1, video:'step2_learn_per_win', speaker:'GLOBO',
    text:()=> S.exactAnswer ? '¡Exacto! El conocimiento es la clave para ganar.' : 'En otras palabras: el conocimiento es la clave para ganar.' },
  { moment:2, video:'step2_girl_sina',     speaker:'GIRL',
    text:'¿Y si no sé algo? ¿Podría aprender jugando?' },
  { moment:2, video:'step2_girl_sina',     speaker:'SINA',
    text:'¡Por supuesto! Cuando completas una actividad, aparece información importante que deberás recordar para los próximos juegos.' },
  { moment:3, video:'step2_leaderboards',  speaker:'MAX',
    text:'Y para que sepan cómo van, hay dos tablas: una por equipos, para ver qué grupo está ganando, y una individual, donde aparecen los mejores competidores del campamento.' },
  { moment:4, video:'step2_thomas_happy',  speaker:'THOMAS',
    text:'¡Al fin una competencia sobre lo que me gusta… la ciencia!' },
  { moment:4, video:'step2_thomas_happy',  speaker:'NARRADOR',
    text:'*Thomas no puede ocultar su alegría.*' },
  { moment:4, video:'step2_thomas_happy',  speaker:'GLOBO',
    text:'¡Con esa energía, vas a llegar lejos, Thomas!', action:'end' },
];

// ── Engine ──────────────────────────────────────────────────────
let flatIdx = -1;

function advanceLine() {
  flatIdx++;
  const line = SCRIPT[flatIdx];
  if (!line) { finishGame(); return; }
  displayLine(line);
}

function displayLine(line) {
  const mi = typeof line.moment==='number' ? line.moment : S.moment;
  updateDots(mi); S.moment = mi;
  if (line.video) setVideo(line.video);
  hideAllBubbles(); hideChoices();

  const txt = typeof line.text==='function' ? line.text() : (line.text||'');
  currentTxt = txt;
  const spk = (line.speaker||'').toUpperCase();

  if      (line.action==='choice_learn') { showLine(spk, txt, ()=>showChoices(LEARN_OPTS)); }
  else if (line.action==='end')          { showLine(spk, txt, ()=>setTimeout(finishGame,1200)); }
  else                                   { showLine(spk, txt, null); }
}

function showLine(speaker, txt, onDone) {
  if (speaker === 'NARRADOR' || !speaker) {
    $narCap.classList.add('show');
    typeWrite(txt, $narText, $narTap, onDone);
    return;
  }
  const key = speaker.toLowerCase();
  if (!CHAR_KEYS.includes(key)) {
    $slots.player.style.display = 'flex';
    $bubbles.player.classList.add('show');
    typeWrite(txt, bubbleTxtEl('player'), bubbleTapEl('player'), onDone);
    return;
  }
  $bubbles[key].classList.add('show');
  typeWrite(txt, bubbleTxtEl(key), bubbleTapEl(key), onDone);
}

// ── Tap to advance ──────────────────────────────────────────────
document.getElementById('scene').addEventListener('click', () => {
  if (S.awaitingChoice) return;
  if (S.typing) { skipTypewrite(); return; }
  advanceLine();
});

// ── Finish ──────────────────────────────────────────────────────
async function finishGame() {
  if (uid) {
    try {
      await updateDoc(doc(db,'estudiantes',uid), {
        paso2_completado:true, paso2_ts:serverTimestamp(),
      });
    } catch(e){ console.warn('Firebase save error:',e); }
  }
  window.parent.postMessage({tipo:'resultado_juego',paso:2,puntos:0,completado:true,tiempo_segundos:0},'*');
  $result.classList.add('show');
}

document.getElementById('finish-btn').addEventListener('click', () => {
  if (window.parent!==window) window.parent.postMessage({tipo:'cerrar_juego'},'*');
  else window.history.back();
});

// ── Music ────────────────────────────────────────────────────────
const $bgMusic = document.getElementById('bg-music');
$bgMusic.volume = 0.3;
document.addEventListener('click', () => $bgMusic.play().catch(()=>{}), {once:true});

// ── Init ────────────────────────────────────────────────────────
onAuthStateChanged(auth, user => {
  uid = user ? user.uid : null;
  $loading.style.display = 'none';
  advanceLine();
});
</script>
</body>
</html>
